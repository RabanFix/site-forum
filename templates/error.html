{% extends "base.html" %}
{% block title %}Ошибка {{ code }} — Транссервис{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">{{ code }}</div>
  <div class="error-message">{{ message }}</div>
  <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
    ← На главную
  </a>
</div>
{% endblock %}
