{% extends "base.html" %}
{% block title %}Вход — Транссервис{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-icon">🚛</div>
    <h1>Вход в аккаунт</h1>
    <p class="auth-sub">Портал заказчиков ООО «Транссервис»</p>

    <form method="POST">
      <div class="form-group">
        <label for="username">Имя пользователя</label>
        <input type="text" id="username" name="username"
               class="form-control" required autofocus
               placeholder="Введите имя пользователя">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password"
               class="form-control" required
               placeholder="Введите пароль"
               autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">
        Войти
      </button>
    </form>

    <div class="auth-footer">
      Нет аккаунта?
      <a href="{{ url_for('register') }}">Зарегистрироваться как Заказчик</a>
    </div>

    <div class="demo-creds">
      <strong>Демо-доступ:</strong><br>
      Заказчик: <code>ivanov</code> / <code>pass123</code><br>
      Руководитель: <code>admin</code> / <code>admin123</code>
    </div>
  </div>
</div>
{% endblock %}
